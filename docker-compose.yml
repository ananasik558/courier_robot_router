version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: courier_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: courier_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d courier_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - courier_net

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: courier_osrm
    # ✅ Путь к файлу map.osrm (без расширения .osrm)
    command: "osrm-routed --algorithm=mld /data/map.osrm"
    volumes:
      - ./osrm/data:/data  # ✅ Убедись что путь к папке data
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - courier_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courier_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      osrm:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/courier_db
      - OSRM_URL=http://osrm:5000
      - PYTHONPATH=/app
    networks:
      - courier_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: courier_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
    networks:
      - courier_net

networks:
  courier_net:
    driver: bridge

volumes:
  pgdata:
    driver: local